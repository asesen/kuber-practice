apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-app
  namespace: kuber-practice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: custom-app
  template:
    metadata:
      labels:
        app: custom-app
    spec:
      containers:
        - name: custom-app
          image: custom-app:local
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_PORT
              value: "8080"
            - name: APP_CONFIG_DIR
              value: /app/config
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: logs
          emptyDir: {}
        - name: config
          configMap:
            name: custom-app-config
