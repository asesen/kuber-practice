apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: kuber-practice
spec:
  type: ClusterIP
  selector:
    app: custom-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: log-service
  namespace: kuber-practice
spec:
  type: ClusterIP
  selector:
    app: archive-store
  ports:
    - name: http
      port: 80
      targetPort: http
