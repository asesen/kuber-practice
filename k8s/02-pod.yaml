apiVersion: v1
kind: Pod
metadata:
  name: custom-app-pod
  namespace: kuber-practice
  labels:
    app: custom-app
spec:
  containers:
    - name: custom-app
      image: custom-app:local
      imagePullPolicy: IfNotPresent
      env:
        - name: APP_PORT
          value: "8080"
        - name: APP_CONFIG_DIR
          value: /app/config
      ports:
        - name: http
          containerPort: 8080
      volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: config
          mountPath: /app/config
          readOnly: true
  volumes:
    - name: logs
      emptyDir: {}
    - name: config
      configMap:
        name: custom-app-config
